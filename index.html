<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Echoes of Wisdom | Daily Quotations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quote-container">
        <div class="brand">
            <h1>✦ Quotient ✦</h1>
            <p>words that resonate, minds that inspire</p>
        </div>
        <div class="quote-card">
            <div class="quote-text" id="quoteText">
                The only limit is your mind.
            </div>
            <div class="quote-author" id="quoteAuthor">
                <span>— <span class="author-name" id="authorName">Anonymous</span></span>
            </div>
            <div class="quote-tag" id="quoteTag">
                #wisdom
            </div>
        </div>
        <div class="actions">
            <button id="newQuoteBtn" class="btn-primary">
                ✨ New Quote
            </button>
            <button id="copyQuoteBtn">
                📋 Copy Quote
            </button>
            <button id="shareQuoteBtn">
                🔗 Share
            </button>
        </div>
        <div class="footer-credit">
            🌿 timeless words — refresh your perspective
        </div>
    </div>
    <div id="toastMsg" class="toast-msg">✨ Copied to clipboard!</div>
    
    <script src="script.js"></script>
</body>
</html>
